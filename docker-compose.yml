services:
  mysql:
    image: mysql:8.0
    container_name: ticket-core-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: ticket_core
    ports:
      - "3306:3306"
    volumes:
      - ticket-core-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ticket-core-mysql-data:
